<!DOCTYPE html>
<html lang="en">
<head>

  <style>

    .field-label { font-size: 0.74rem; font-weight: 700; letter-spacing: .04em; color: #475569; text-transform: uppercase; }

    .condition-row:hover { background:#f8fafc; }
    .condition-row.open { background:#f8fafc; }

    .condition-row.selected .condition-title { color:#1e3a8a; font-weight:700; }
    .condition-title { font-size:13px; line-height:1.05rem; font-weight:500; color:#1f2937; }
    .condition-symbol { width:1rem; flex:0 0 1rem; text-align:center; color:#94a3b8; font-weight:700; line-height:1.05rem; }
    .condition-row.selected .condition-symbol { color:#1e3a8a; }

    .subheading-text { font-size: 11px; line-height: 1.35; color: #94a3b8; font-weight: 400; }
    .tilebtn { display:inline-flex; align-items:center; justify-content:center; border:1px solid #e2e8f0; border-radius:999px; padding:.18rem .55rem; font-size:.63rem; font-weight:600; color:#64748b; background:#ffffff; cursor:pointer; user-select:none; min-height:1.55rem; line-height:1; text-align:center; transition:all .16s ease; }
    .tilebtn:hover { background:#f1f5f9; border-color:#cbd5e1; }
    .tilebtn.active { background:#111827; color:white; border-color:#111827; box-shadow:0 1px 2px rgba(0,0,0,.08); }
    .tag { display:block; width:100%; text-align:left; border:1px solid #e5e7eb; border-radius:1rem; background:rgba(255,255,255,0.78); padding:.62rem .78rem; font-size:.76rem; line-height:1.35; transition:all .16s ease; }
    .tag:hover { background:#f1f5f9; }
    .src { display:inline-flex; align-items:center; border:1px solid #e2e8f0; border-radius:999px; background:white; color:#64748b; font-size:.62rem; font-weight:800; padding:.08rem .35rem; margin-left:.25rem; }
    .tab.active { background:#e8eefc; color:#1e3a8a; }
    .tab { white-space:nowrap; font-size:.72rem; padding:.45rem .75rem !important; border-radius:.75rem; }
  </style>
</head>
<body class="bg-white text-slate-900 min-h-screen">
  <div class="max-w-7xl mx-auto p-4 md:p-6">
    <header class="flex flex-col md:flex-row md:items-end md:justify-between gap-3 mb-4">
      <h1 class="text-2xl md:text-3xl font-bold tracking-tight"><span class="text-slate-600">MFM</span> Prechart</h1>
      <div class="flex gap-2">
        <button id="generateBtn" class="rounded-xl bg-slate-900 text-white px-3 py-2 text-sm font-semibold shadow-sm hover:bg-slate-800">Generate</button>
        <button id="copyBtn" class="rounded-xl bg-white border border-slate-300 px-3 py-2 text-sm font-semibold shadow-sm hover:bg-slate-100">Copy</button>
        <button id="clearBtn" class="rounded-xl bg-white border border-slate-300 px-3 py-2 text-sm font-semibold shadow-sm hover:bg-slate-100">Clear</button>
      </div>
    </header>
    <nav class="bg-white/80 backdrop-blur rounded-2xl border border-slate-200 shadow-sm p-1 overflow-x-auto mb-4">
      <div id="tabs" class="flex gap-2 min-w-max"></div>
    </nav>
    <main class="grid grid-cols-1 xl:grid-cols-[minmax(0,1fr)_420px] gap-5">
      <section id="pageRoot" class="space-y-3"></section>
      <section class="xl:sticky xl:top-4 h-fit">
        <div class="bg-white rounded-2xl border border-slate-200 p-4 shadow-sm">
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-lg font-bold">Epic-ready output</h2>
            <span id="copyStatus" class="text-sm text-emerald-700 font-bold hidden">Copied!</span>

            <summary class="cursor-pointer font-semibold">Self-tests</summary>
            <pre id="testResults" class="mt-2 whitespace-pre-wrap"></pre>
          </details>
        </div>
      </section>
    </main>
  </div>

function esc(value) { return String(value ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;'); }
function get(id) { return state.values[id] || ''; }
function choice(id) { return state.values[id] || ''; }
function setVal(id, value) { state.values[id] = value; generate(); }
function toggleChoice(id, value) { if (state.values[id] === value) delete state.values[id]; else state.values[id] = value; if (id === 'hepb_titer') delete state.values.hepb_action; render(); generate(); }
function toggleInd(key) { if (state.indications.has(key)) state.indications.delete(key); else state.indications.add(key); render(); generate(); }

function addImmunizationLine(lines, key, label) { const action = choice(key + '_action'); const marker = action === 'received' ? '[x]' : (action === 'ni' ? '[/]' : '[]'); const text = [action === 'received' ? 'received' : (action === 'declined' ? 'declined' : (action === 'ni' ? 'not indicated' : '')), get(key + '_note')].filter(Boolean).join(', '); lines.push('    ' + marker + ' ' + label + ': ' + text); }
function addHepatitisBLine(lines) { const titer = choice('hepb_titer'); if (titer === 'immune') { lines.push('    [/] Hepatitis B: immune'); return; } if (titer === 'nonimmune') { lines.push('    [] Hepatitis B: non-immune' + (get('hepb_note') ? ', ' + get('hepb_note') : '')); return; } if (titer === 'notdone') { lines.push('    [] Hepatitis B: not done' + (get('hepb_note') ? ', ' + get('hepb_note') : '')); return; } addImmunizationLine(lines, 'hepb', 'Hepatitis B'); }
function generate() { const lines = []; lines.push('1. Prenatal care:'); lines.push('    Routine labs'); lines.push('        ' + (choice('oneT_action') === 'completed' ? '[x]' : '[]') + ' 1T: ' + ([choice('oneT_action'), get('oneT_note')].filter(Boolean).join(', '))); const gttMarker = choice('gtt_action') === 'done' ? '[x]' : (choice('gtt_action') === 'ni' ? '[/]' : '[]'); const gttText = choice('gtt_action') === 'done' ? ['completed', get('gtt_value')].filter(Boolean).join(', ') : (choice('gtt_action') === 'ni' ? get('gtt_reason') : ''); lines.push('        ' + gttMarker + ' GTT: ' + gttText); lines.push('        ' + (choice('threeT_action') === 'completed' ? '[x]' : '[]') + ' 3T: ' + ([choice('threeT_action'), get('threeT_note')].filter(Boolean).join(', '))); const gbsResult = choice('gbs_result') === 'neg' ? 'neg' : get('gbs_custom'); const pcnText = choice('pcn_allergy') === 'yes' ? ['PCN allergy', get('pcn_reaction')].filter(Boolean).join(' - ') : (choice('pcn_allergy') === 'no' ? 'denies PCN allergy' : ''); lines.push('        ' + (choice('gbs_action') === 'completed' ? '[x]' : '[]') + ' GBS: ' + [gbsResult, pcnText].filter(Boolean).join(', ')); const hsvText = choice('hsv_action') === 'denies' ? 'denies for self and partner' : (choice('hsv_action') === 'unknown' ? 'unknown' : get('hsv_custom')); lines.push('    Hx of HSV: ' + hsvText); lines.push('    Pap Hx: ' + get('pap')); const carrierText = choice('carrier_action') === 'ordered' ? 'ordered' : [get('carrier_year') ? 'previously done in ' + get('carrier_year') : '', choice('carrier_result') === 'neg' ? 'neg' : get('carrier_custom')].filter(Boolean).join(', '); lines.push('    ' + (choice('carrier_action') === 'completed' ? '[x]' : '[]') + ' Carrier screen: ' + carrierText); const niptText = choice('nipt_action') === 'completed' ? [choice('nipt_result') === 'low risk' ? 'low risk' : '', get('nipt_custom')].filter(Boolean).join(', ') : ''; lines.push('    ' + (choice('nipt_action') === 'completed' ? '[x]' : '[]') + ' NIPT: ' + niptText); lines.push('    ' + (choice('careplan_action') === 'done' ? '[x]' : '[]') + ' Enrolled in pregnancy care plan:'); lines.push(''); lines.push('2. High risk plan:'); const egttMarker = choice('earlygtt_action') === 'completed' ? '[x]' : (choice('earlygtt_action') === 'ni' ? '[/]' : '[]'); const egttText = choice('earlygtt_action') === 'ordered' ? 'ordered' : (choice('earlygtt_action') === 'ni' ? ['not indicated', get('earlygtt_reason')].filter(Boolean).join(' - ') : [get('earlygtt_note'), get('a1c') ? 'A1c ' + get('a1c') : ''].filter(Boolean).join(', ')); lines.push('    ' + egttMarker + ' Early GTT: ' + egttText); lines.push('    ' + (choice('asa_action') === 'indicated' ? '[x]' : (choice('asa_action') === 'ni' ? '[/]' : '[]')) + ' ASA: ' + (choice('asa_action') === 'ni' ? 'not indicated' : get('asa_note'))); let preeText = ''; if (choice('preelabs_action') === 'ni') preeText = 'not indicated'; if (choice('preelabs_action') === 'indicated' && choice('preelabs_status') === 'ordered') preeText = 'ordered'; if (choice('preelabs_action') === 'indicated' && choice('preelabs_status') === 'resulted') preeText = [get('preelabs_date') ? '(' + get('preelabs_date') + ')' : '', get('preelabs_plt') ? 'plt ' + get('preelabs_plt') : '', get('preelabs_astalt') ? 'AST/ALT ' + get('preelabs_astalt') : '', get('preelabs_cr') ? 'Cr ' + get('preelabs_cr') : '', get('preelabs_upcr') ? 'UPCR ' + get('preelabs_upcr') : ''].filter(Boolean).join(', '); lines.push('    ' + (choice('preelabs_action') === 'ni' ? '[/]' : (choice('preelabs_status') === 'resulted' ? '[x]' : '[]')) + ' Baseline preeclampsia labs: ' + preeText); lines.push('    [] AFP: ' + get('afp_note')); lines.push('    [] NST/AFI: ' + [get('nst'), get('nst_last')].filter(Boolean).join(', ')); lines.push('    [] Growths: ' + [get('growth'), get('growth_last')].filter(Boolean).join(', ')); lines.push('    [] Mode of delivery: ' + get('mod_note')); lines.push('    [] Timing of delivery: ' + get('timing_note')); lines.push(''); lines.push('3. Postpartum Plan:'); lines.push('    [] Feeding plan: ' + get('feeding')); if (choice('pump_action') === 'received') lines.push('        [x] Pump: received'); else if (choice('pump_action') === 'neb') lines.push('        [] Pump: NEB form filled out today'); else lines.push('        [] Pump:'); lines.push('    [] Contraception Plan: ' + get('contraception')); lines.push('    [] Medication Plan: ' + get('medplan')); lines.push('    [] Postpartum Visits Plan: ' + get('ppvisits')); lines.push('    [] Transition to primary care: ' + get('pcp')); lines.push(''); lines.push('4. Ultrasounds:'); lines.push('    ' + (choice('dating_done') === 'done' ? '[x]' : '[]') + ' Dating US: ' + get('dating')); lines.push('    ' + (choice('nt') === 'done' ? '[x]' : '[]') + ' NT screen (11-0 to 13-6): ' + [get('nt_date'), get('nt_note')].filter(Boolean).join(', ')); lines.push('    ' + (choice('anatomy') === 'done' ? '[x]' : '[]') + ' Anatomy US: ' + [get('anatomy_date'), choice('views_status'), get('anatomy_note')].filter(Boolean).join(', ')); lines.push('    ' + (choice('echo') === 'indicated' ? '[x]' : '[]') + ' Fetal Echo: ' + get('echo_note')); lines.push(''); lines.push('5. Immunizations:'); addImmunizationLine(lines, 'tdap', 'Tdap (27-36w)'); addImmunizationLine(lines, 'flu', 'Flu'); addImmunizationLine(lines, 'covid', 'COVID'); addImmunizationLine(lines, 'rsv', 'RSV (32-36w Sept-Jan, one pregnancy only)'); addImmunizationLine(lines, 'hepa', 'Hepatitis A'); addHepatitisBLine(lines); lines.push(''); lines.push('6. Remainder of prenatal care: ' + get('remainder')); document.getElementById('output').value = lines.join('\n').trim(); }
async function copyOutput() { generate(); const out = document.getElementById('output'); out.select(); try { await navigator.clipboard.writeText(out.value); } catch (err) { document.execCommand('copy'); } const status = document.getElementById('copyStatus'); status.classList.remove('hidden'); setTimeout(function() { status.classList.add('hidden'); }, 1200); }
function clearAll() { state.values = {}; state.indications = new Set(); state.openGroups = new Set(); render(); generate(); }
function runTests() { const results = []; try { if (!allInds().some(function(x) { return x.key === 'gdma1' && x.label === 'A1GDM'; })) throw new Error('A1GDM indication missing'); if (!allInds().some(function(x) { return x.key === 'velamentous'; })) throw new Error('placental/cord indications missing'); if (!pageRoutine().includes('Hep B titers')) throw new Error('Hep B titers UI missing'); if (!pageRoutine().includes('High Risk Care')) throw new Error('High Risk Care section missing'); if (hepatitisBCard().includes('return hepatitisBCard')) throw new Error('Hep B recursion bug'); if (typeof pageRoutine !== 'function') throw new Error('pageRoutine is not a function'); if (pageRoutine().includes('function pageRoutine {')) throw new Error('pageRoutine syntax fragment present'); const oldValue = state.values.__test; state.values.__test = 'ok'; if (get('__test') !== 'ok') throw new Error('state getter failed'); if (oldValue === undefined) delete state.values.__test; else state.values.__test = oldValue; results.push('✅ All self-tests passed'); } catch (err) { results.push('❌ ' + err.message); } document.getElementById('testResults').textContent = results.join('\n'); }
document.addEventListener('click', function(event) { const pageBtn = event.target.closest('[data-page]'); if (pageBtn) { state.page = Number(pageBtn.dataset.page); render(); return; } const choiceBtn = event.target.closest('[data-choice-id]'); if (choiceBtn) { toggleChoice(choiceBtn.dataset.choiceId, choiceBtn.dataset.choiceValue); return; } const indBtn = event.target.closest('[data-ind]'); if (indBtn) { toggleInd(indBtn.dataset.ind); return; } const groupBtn = event.target.closest('[data-group]'); if (groupBtn) { toggleGroup(groupBtn.dataset.group); return; } const applyBtn = event.target.closest('[data-apply-text]'); if (applyBtn) { setVal(applyBtn.dataset.applyRow, applyBtn.dataset.applyText); return; } });
document.addEventListener('input', function(event) { if (event.target && event.target.dataset && event.target.dataset.inputId) setVal(event.target.dataset.inputId, event.target.value); });
document.getElementById('generateBtn').addEventListener('click', generate);
document.getElementById('copyBtn').addEventListener('click', copyOutput);
document.getElementById('clearBtn').addEventListener('click', clearAll);
render();
generate();
runTests();
</script>
